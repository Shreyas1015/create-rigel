name: Release

# Publishes to npm when you push a version tag, e.g.:
#   npm version patch      (bumps package.json + creates the tag)
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance (verified supply-chain badge)

jobs:
  publish:
    runs-on: ubuntu-latest
    # Protected environment: holds NPM_TOKEN, requires your approval, and is
    # restricted to v* tags — so a publish can't be triggered from a random ref.
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Smoke test before publishing
        run: npm test
      - name: Publish to npm (public, with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
